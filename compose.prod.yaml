# ──────────────────────────────────────────────────────────
# SwiftApp Postal — Production Docker Compose
# ──────────────────────────────────────────────────────────

services:

  postgres:
    image: postgres:17-alpine
    container_name: swiftapp-postal-db
    labels:
      - "sablier.enable=true"
      - "sablier.group=postal-dotnet"
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    restart: unless-stopped
    networks:
      - backend
    deploy:
      resources:
        limits:
          memory: 256M

  redis:
    image: redis:7-alpine
    container_name: swiftapp-postal-redis
    labels:
      - "sablier.enable=true"
      - "sablier.group=postal-dotnet"
    command: redis-server --appendonly yes --maxmemory 128mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - backend
    deploy:
      resources:
        limits:
          memory: 128M

  webapi:
    build:
      context: .
      dockerfile: docker/app/Dockerfile
      args:
        PROJECT: SwiftApp.Postal.WebApi
    container_name: swiftapp-postal-webapi
    labels:
      - "sablier.enable=true"
      - "sablier.group=postal-dotnet"
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ASPNETCORE_URLS: "http://+:8080"
      ConnectionStrings__DefaultConnection: "Host=postgres;Port=5432;Database=${POSTGRES_DB};Username=${POSTGRES_USER};Password=${POSTGRES_PASSWORD}"
      ConnectionStrings__Redis: "redis:6379,abortConnect=false"
      Jwt__SecretKey: ${JWT_SECRET}
      Jwt__Issuer: ${JWT_ISSUER}
      Jwt__Audience: ${JWT_AUDIENCE}
      Keycloak__Authority: "https://keycloak.swiftapp.ch/realms/swiftapp-postal"
      Keycloak__ClientId: "postal-api"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://127.0.0.1:8080/health"]
      interval: 30s
      timeout: 10s
      start_period: 60s
      retries: 3
    restart: unless-stopped
    networks:
      - backend
      - frontend
    deploy:
      resources:
        limits:
          memory: 384M

  webapp:
    build:
      context: .
      dockerfile: docker/app/Dockerfile
      args:
        PROJECT: SwiftApp.Postal.WebApp
    container_name: swiftapp-postal-webapp
    labels:
      - "sablier.enable=true"
      - "sablier.group=postal-dotnet"
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ASPNETCORE_URLS: "http://+:8080"
      ConnectionStrings__DefaultConnection: "Host=postgres;Port=5432;Database=${POSTGRES_DB};Username=${POSTGRES_USER};Password=${POSTGRES_PASSWORD}"
      ConnectionStrings__Redis: "redis:6379,abortConnect=false"
      Keycloak__Authority: "https://keycloak.swiftapp.ch/realms/swiftapp-postal"
      Keycloak__PublicAuthority: "https://keycloak.swiftapp.ch/realms/swiftapp-postal"
      Keycloak__ClientId: "postal-webapp"
      Keycloak__ClientSecret: "demo-secret-not-real"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://127.0.0.1:8080/health"]
      interval: 30s
      timeout: 10s
      start_period: 60s
      retries: 3
    restart: unless-stopped
    networks:
      - backend
      - frontend
    deploy:
      resources:
        limits:
          memory: 384M

  nginx:
    build:
      context: ./docker/nginx
    container_name: swiftapp-postal-nginx
    depends_on:
      webapi:
        condition: service_healthy
      webapp:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - frontend
      - traefik
    labels:
      - "traefik.enable=true"
      - "traefik.docker.allownonrunning=true"
      - "traefik.http.routers.swiftapp-postal.rule=Host(`postal-dotnet.swiftapp.ch`)"
      - "traefik.http.routers.swiftapp-postal.entrypoints=websecure"
      - "traefik.http.routers.swiftapp-postal.tls.certresolver=letsencrypt"
      - "traefik.http.routers.swiftapp-postal.middlewares=sablier-postal-dotnet@file"
      - "traefik.http.services.swiftapp-postal.loadbalancer.server.port=80"
      - "sablier.enable=true"
      - "sablier.group=postal-dotnet"
    deploy:
      resources:
        limits:
          memory: 128M

volumes:
  pgdata:
    driver: local
    name: swiftapp-postal-pgdata-prod
  redis_data:
    driver: local
    name: swiftapp-postal-redis-prod

networks:
  backend:
    driver: bridge
    name: swiftapp-postal-backend
  frontend:
    driver: bridge
    name: swiftapp-postal-frontend
  traefik:
    external: true
