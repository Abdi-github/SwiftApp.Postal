# ──────────────────────────────────────────────────────────
# SwiftApp Postal — Production Docker Compose
# ──────────────────────────────────────────────────────────

services:

  postgres:
    image: postgres:17
    container_name: swiftapp-postal-db
    mem_limit: 512m
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - backend

  redis:
    image: redis:7-alpine
    container_name: swiftapp-postal-redis
    command: redis-server --appendonly yes --maxmemory 512mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - backend

  webapi:
    build:
      context: .
      dockerfile: docker/app/Dockerfile
      args:
        PROJECT: SwiftApp.Postal.WebApi
    container_name: swiftapp-postal-webapi
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ConnectionStrings__DefaultConnection: "Host=postgres;Port=5432;Database=${POSTGRES_DB};Username=${POSTGRES_USER};Password=${POSTGRES_PASSWORD}"
      ConnectionStrings__Redis: "redis:6379,abortConnect=false"
      Jwt__SecretKey: ${JWT_SECRET}
      Jwt__Issuer: ${JWT_ISSUER}
      Jwt__Audience: ${JWT_AUDIENCE}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - backend
      - frontend

  webapp:
    build:
      context: .
      dockerfile: docker/app/Dockerfile
      args:
        PROJECT: SwiftApp.Postal.WebApp
    container_name: swiftapp-postal-webapp
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ConnectionStrings__DefaultConnection: "Host=postgres;Port=5432;Database=${POSTGRES_DB};Username=${POSTGRES_USER};Password=${POSTGRES_PASSWORD}"
      ConnectionStrings__Redis: "redis:6379,abortConnect=false"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - backend
      - frontend

  nginx:
    build:
      context: ./docker/nginx
    container_name: swiftapp-postal-nginx
    depends_on:
      - webapi
      - webapp
    restart: unless-stopped
    networks:
      - frontend
      - traefik
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.swiftapp-postal.rule=Host(`postal-dotnet.swiftapp.ch`)"
      - "traefik.http.routers.swiftapp-postal.entrypoints=websecure"
      - "traefik.http.routers.swiftapp-postal.tls.certresolver=letsencrypt"
      - "traefik.http.services.swiftapp-postal.loadbalancer.server.port=80"

volumes:
  pgdata:
    driver: local
  redis_data:
    driver: local

networks:
  backend:
    driver: bridge
  frontend:
    driver: bridge
  traefik:
    external: true
